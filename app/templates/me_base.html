<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#20242c">
<title>{% block title %}Time Clock{% endblock %} · L98</title>
<link rel="manifest" href="{{ url_for('me.manifest_json') }}">
<link rel="icon" href="{{ url_for('static', filename='clock-icon.svg') }}">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='clock-icon.svg') }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='me.css') }}">
</head>
<body>
<div class="wrap">
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('{{ url_for("me.sw_js") }}', { scope: '/me/' }).catch(function () {});
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
